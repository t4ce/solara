name: Publish crate

on:
  push:
    branches:
      - main
    paths:
      - Cargo.toml

permissions:
  contents: read

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect package version change
        id: version
        shell: bash
        run: |
          set -euo pipefail

          new_version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)"
          old_version=""

          if git cat-file -e "${{ github.event.before }}:Cargo.toml" 2>/dev/null; then
            old_version="$(git show "${{ github.event.before }}:Cargo.toml" | sed -n 's/^version = "\(.*\)"/\1/p' | head -n 1)"
          fi

          if [[ -n "$new_version" && "$new_version" != "$old_version" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

          echo "old_version=$old_version" >> "$GITHUB_OUTPUT"
          echo "new_version=$new_version" >> "$GITHUB_OUTPUT"

      - name: Install Rust toolchain
        if: steps.version.outputs.changed == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Run tests
        if: steps.version.outputs.changed == 'true'
        run: cargo test --locked

      - name: Check package
        if: steps.version.outputs.changed == 'true'
        run: cargo publish --dry-run --locked

      - name: Publish crate
        if: steps.version.outputs.changed == 'true'
        run: cargo publish --locked --token "$CARGO_REGISTRY_TOKEN"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
