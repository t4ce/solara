[package]
name = "rust-qjs-dom"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
license-file = "LICENSE"
description = "A std-enabled QuickJS host for the renderer-free TrueSurfer DOM pipeline"
repository = "https://github.com/t4ce/RustQJSDom"
build = "build.rs"
links = "rust_qjs_dom_quickjs"
include = [
    "Cargo.toml",
    "build.rs",
    "LICENSE",
    "README.md",
    "THIRD_PARTY_NOTICES.md",
    "docs/**",
    "src/**",
    "js/**",
    "schema/**",
    "scripts/prove.sh",
    "tests/**",
    "licenses/**",
    "vendor/quickjs/*.c",
    "vendor/quickjs/*.h",
    "vendor/quickjs/LICENSE",
    "vendor/quickjs/VERSION",
]

[lib]
name = "rust_qjs_dom"
path = "src/lib.rs"

[[bin]]
name = "rust-qjs-dom"
path = "src/main.rs"

[dependencies]
lightningcss = { version = "=1.0.0-alpha.70", default-features = false }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[build-dependencies]
cc = "1.2"

[profile.release]
lto = "thin"
codegen-units = 1
strip = true
