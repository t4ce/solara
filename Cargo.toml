[package]
name = "solara"
version = "0.0.6"
edition = "2024"
rust-version = "1.85"
authors = ["iamwjun"]
description = "A small experimental browser built with Rust and QuickJS."
readme = "README.md"
license = "MIT"
repository = "https://github.com/iamwjun/solara"
homepage = "https://github.com/iamwjun/solara"
keywords = ["browser", "quickjs", "rust", "web", "renderer"]
categories = ["gui", "web-programming"]
include = [
    "Cargo.toml",
    "Cargo.lock",
    "LICENSE",
    "README.md",
    "src/**/*.rs",
    "src/**/*.wgsl",
    "src/gpu_ui/fonts/*",
    "docs/demoui.html",
    "docs/demoui.css",
    "docs/engine-handoff.md",
]

[dependencies]
env_logger = "0.11"
log = "0.4"
rust-qjs-dom = { version = "0.1.0", path = "vendor/RustQJSDom" }
# Dormant legacy CSS experiment; active styles come from RustQJSDom/Lightning CSS.
stylo = { version = "0.18", default-features = false, features = ["servo"] }
stylo_traits = { version = "0.18", default-features = false, features = ["servo"] }
ureq = "3.3.0"
url = "2"
wgpu = "23"
wgpu_glyph = "0.23"
winit = "0.30"
